<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ================= SEO OPTIMIZATIONS ================= -->
    <!-- 1. Primary Meta Tags -->
    <title>Mr. Souravh Choursiya | Student | University of Delhi</title>
    <meta
      name="title"
      content="Mr. Souravh Choursiya | Student | University of Delhi"
    />
    <meta
      name="description"
      content="Souravh Choursiya is an M.Com student of Delhi University and a keen researcher in the area of Finance and International Business."
    />
    <meta
      name="keywords"
      content="Souravh Choursiya, Finance and International Business, Conceptual Synthesis, Security Analysis, University of Delhi, Researcher, AI"
    />
    <meta name="author" content="Mr. Souravh Choursiya" />

    <!-- Favicon (Graduation Cap Emoji as SVG) -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>"
    />

    <!-- 2. Open Graph / Facebook (For link sharing previews) -->
    <meta property="og:type" content="profile" />
    <meta
      property="og:url"
      content="https://souravhchoursiya.github.io/profile/"
    />
    <meta
      property="og:title"
      content="Mr. Souravh Choursiya - Researcher Profile"
    />
    <meta
      property="og:description"
      content="Student at University of Delhi focusing on Finance and International Business."
    />
    <meta property="og:image" content="" />

    <!-- 3. Twitter Card -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta
      property="twitter:url"
      content="https://souravhchoursiya.github.io/profile/"
    />
    <meta
      property="twitter:title"
      content="Mr. Souravh Choursiya - Researcher Profile"
    />
    <meta
      property="twitter:description"
      content="Student at University of Delhi focusing on Finance and International Business."
    />
    <meta property="twitter:image" content="" />

    <!-- 4. Schema.org Structured Data (Crucial for Google Knowledge Panels and Scholar) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Souravh Choursiya",
        "honorificPrefix": "Mr.",
        "jobTitle": "Student",
        "affiliation": {
          "@type": "Organization",
          "name": "University of Delhi"
        },
        "url": "https://souravhchoursiya.github.io/profile/",
        "image": "",
        "sameAs": [
          "https://scholar.google.com/citations?user=YOUR_ID",
          "https://orcid.org/0000-0002-1234-5678"
        ],
        "knowsAbout": ["Finance", "International Business"]
      }
    </script>
    <!-- ===================================================== -->

    <!-- Google tag (gtag.js) - Replace G-XXXXXXXXXX with your actual Measurement ID -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      // Replace G-XXXXXXXXXX here as well
      gtag("config", "G-XXXXXXXXXX");
    </script>

    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Load React & ReactDOM -->
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>

    <!-- Load Babel to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body class="bg-slate-50">
    <!-- Fallback for basic crawlers that don't execute JavaScript -->
    <noscript>
      <div style="padding: 20px; font-family: sans-serif">
        <h1>Mr. Souravh Choursiya</h1>
        <h2>Student at University of Delhi</h2>
        <p>Research focusing on Finance and International Business.</p>
        <p>
          Please enable JavaScript to view the full interactive profile and
          publication list.
        </p>
      </div>
    </noscript>

    <div id="root"></div>

    <script type="text/babel">
      // --- INLINE ICONS ---
      // Replacing Lucide imports with inline SVG components for standalone browser compatibility
      const Mail = ({ className }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <rect width="20" height="16" x="2" y="4" rx="2" />
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
        </svg>
      );
      const BookOpen = ({ className }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
        </svg>
      );
      const Building2 = ({ className }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z" />
          <path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2" />
          <path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2" />
          <path d="M10 6h4" />
          <path d="M10 10h4" />
          <path d="M10 14h4" />
          <path d="M10 18h4" />
        </svg>
      );
      const MapPin = ({ className }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" />
          <circle cx="12" cy="10" r="3" />
        </svg>
      );
      const ExternalLink = ({ className }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <path d="M15 3h6v6" />
          <path d="M10 14 21 3" />
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
        </svg>
      );
      const FileText = ({ className }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z" />
          <path d="M14 2v4a2 2 0 0 0 2 2h4" />
          <path d="M10 9H8" />
          <path d="M16 13H8" />
          <path d="M16 17H8" />
        </svg>
      );
      const ChevronRight = ({ className }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <path d="m9 18 6-6-6-6" />
        </svg>
      );
      const GraduationCap = ({ className }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <path d="M21.42 10.922a2 2 0 0 0-.019-3.838L12.83 4.018a2 2 0 0 0-1.66 0L2.6 7.08a2 2 0 0 0 0 3.832l8.57 3.064a2 2 0 0 0 1.66 0z" />
          <path d="M22 10v6" />
          <path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5" />
        </svg>
      );
      const Link2 = ({ className }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <path d="M9 17H7A5 5 0 0 1 7 7h2" />
          <path d="M15 7h2a5 5 0 1 1 0 10h-2" />
          <line x1="8" x2="16" y1="12" y2="12" />
        </svg>
      );

      // --- MAIN APP COMPONENT ---
      function ResearcherProfile() {
        // Edit this object with your actual data
        const profileData = {
          personal: {
            name: "Mr. Souravh Choursiya",
            initials: "SC",
            photoUrl: "", // Add your photo URL here
            role: "Student",
            affiliation: "Department of Commerce",
            department: "University of Delhi",
            location: "New Delhi, India",
            email: "souravhchoursiya@commerce.du.ac.in",
            googleScholar: "#",
            orcid: "#",
          },
          bio: "Souravh Choursiya is a Student in the Department of Commerce at University of Delhi. His research focuses on the Finance and International Business.",
          interests: [
            "Finance",
            "International Business",
            "Security Analysis",
            "Conceptual Synthesis",
          ],
          publications: [
            {
              id: 1,
              year: "2025",
              title: "Soon...",
              authors: "Choursiya, S.",
              venue: "Soon...",
              link: "#",
              type: "Journal",
            },
          ],
        };

        const formatAuthors = (authorsStr) => {
          const parts = authorsStr.split("Choursiya, S.");
          if (parts.length === 1) return authorsStr;
          return (
            <React.Fragment>
              {parts[0]}
              <strong className="text-slate-900 font-bold">
                Choursiya, S.
              </strong>
              {parts[1]}
            </React.Fragment>
          );
        };

        return (
          <div className="min-h-screen flex flex-col">
            {/* --- HERO HEADER: Centered & Minimal --- */}
            <header className="w-full bg-white border-b border-slate-200 pt-20 pb-16 px-4 sm:px-6 lg:px-8 text-center">
              <div className="max-w-4xl mx-auto">
                {/* Avatar */}
                <div className="w-32 h-32 sm:w-40 sm:h-40 mx-auto rounded-full bg-slate-100 ring-4 ring-slate-50 shadow-lg flex items-center justify-center text-slate-500 text-4xl font-serif font-bold tracking-wider mb-6 sm:mb-8 overflow-hidden">
                  {profileData.personal.photoUrl ? (
                    <img
                      src={profileData.personal.photoUrl}
                      alt={profileData.personal.name}
                      className="w-full h-full object-cover"
                    />
                  ) : (
                    <div className="w-full h-full bg-slate-200 flex items-center justify-center animate-pulse">
                      <svg
                        className="w-2/3 h-2/3 text-slate-400 mt-3"
                        fill="currentColor"
                        viewBox="0 0 20 20"
                        xmlns="http://www.w3.org/2000/svg"
                      >
                        <path
                          fillRule="evenodd"
                          d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"
                          clipRule="evenodd"
                        />
                      </svg>
                    </div>
                  )}
                </div>

                {/* Identity */}
                <h1 className="text-4xl sm:text-5xl font-serif font-bold text-slate-900 mb-4">
                  {profileData.personal.name}
                </h1>
                <p className="text-lg sm:text-xl text-slate-700 font-medium mb-2">
                  {profileData.personal.role}
                </p>
                <div className="flex flex-col sm:flex-row items-center justify-center text-slate-500 mb-8 gap-1 sm:gap-2">
                  <span className="flex items-center">
                    <Building2 className="w-4 h-4 mr-1.5 opacity-70" />{" "}
                    {profileData.personal.affiliation}
                  </span>
                  <span className="hidden sm:inline">•</span>
                  <span>{profileData.personal.department}</span>
                </div>

                {/* Inline Contact & Socials */}
                <div className="flex flex-wrap justify-center gap-x-8 gap-y-4 text-sm text-slate-600">
                  <a
                    href={`mailto:${profileData.personal.email}`}
                    className="flex items-center hover:text-blue-700 transition-colors"
                  >
                    <Mail className="w-4 h-4 mr-2 opacity-60" />
                    <span className="hover:underline">
                      {profileData.personal.email}
                    </span>
                  </a>
                  <div className="flex items-center">
                    <MapPin className="w-4 h-4 mr-2 opacity-60" />
                    {profileData.personal.location}
                  </div>
                  <a
                    href={profileData.personal.googleScholar}
                    className="flex items-center hover:text-blue-700 transition-colors"
                  >
                    <GraduationCap className="w-4 h-4 mr-2 opacity-60" />
                    <span className="hover:underline">Google Scholar</span>
                    <ExternalLink className="w-3 h-3 ml-1 opacity-40" />
                  </a>
                  <div className="flex items-center">
                    <Link2 className="w-4 h-4 mr-2 opacity-60" />
                    ORCID:{" "}
                    <span className="ml-1 font-mono text-xs text-slate-500">
                      {profileData.personal.orcid}
                    </span>
                  </div>
                </div>
              </div>
            </header>

            {/* --- MAIN CONTENT: Streamlined Layout --- */}
            <main className="flex-grow w-full max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-16 space-y-16">
              {/* Bio & Interests Split */}
              <div className="grid grid-cols-1 md:grid-cols-3 gap-12">
                {/* Biography (Left, takes 2/3 width) */}
                <section className="md:col-span-2">
                  <h2 className="text-2xl font-serif font-bold text-slate-900 border-b border-slate-200 pb-3 mb-6 uppercase tracking-wider text-sm">
                    Biography
                  </h2>
                  <p className="text-slate-700 leading-relaxed text-justify font-sans">
                    {profileData.bio}
                  </p>
                </section>

                {/* Research Interests (Right, takes 1/3 width) */}
                <section className="md:col-span-1">
                  <h2 className="text-2xl font-serif font-bold text-slate-900 border-b border-slate-200 pb-3 mb-6 uppercase tracking-wider text-sm">
                    Research Focus
                  </h2>
                  <ul className="flex flex-col gap-3">
                    {profileData.interests.map((interest, idx) => (
                      <li key={idx} className="flex items-start">
                        <span className="w-1.5 h-1.5 rounded-full bg-slate-400 mt-2 mr-3 shrink-0"></span>
                        <span className="text-slate-700 font-medium text-sm">
                          {interest}
                        </span>
                      </li>
                    ))}
                  </ul>
                </section>
              </div>

              {/* Selected Publications (Full Width Margin Style) */}
              <section>
                <div className="flex justify-between items-baseline border-b border-slate-200 pb-3 mb-8">
                  <h2 className="text-2xl font-serif font-bold text-slate-900 uppercase tracking-wider text-sm">
                    Selected Publications
                  </h2>
                  <a
                    href={profileData.personal.googleScholar}
                    className="text-sm font-medium text-blue-700 hover:text-blue-900 hover:underline flex items-center transition-colors"
                  >
                    View all on Google Scholar{" "}
                    <ChevronRight className="w-3 h-3 ml-0.5" />
                  </a>
                </div>

                <div className="space-y-8">
                  {profileData.publications.map((pub) => (
                    <div
                      key={pub.id}
                      className="flex flex-col sm:flex-row gap-2 sm:gap-6 group"
                    >
                      {/* Margin Year */}
                      <div className="sm:w-16 shrink-0 pt-0.5">
                        <span className="font-serif text-slate-400 text-sm sm:text-base font-bold">
                          {pub.year}
                        </span>
                      </div>

                      {/* Citation Details */}
                      <div className="grow">
                        <h3 className="text-base font-bold text-slate-900 leading-snug mb-1.5">
                          <a
                            href={pub.link}
                            className="hover:text-blue-700 hover:underline transition-colors decoration-blue-300 underline-offset-2"
                          >
                            {pub.title}
                          </a>
                        </h3>
                        <p className="text-sm text-slate-700 mb-1">
                          {formatAuthors(pub.authors)}
                        </p>
                        <p className="text-sm font-medium text-slate-500 italic flex items-center flex-wrap gap-2">
                          {pub.venue}
                          <span className="hidden sm:inline-block w-1 h-1 rounded-full bg-slate-300"></span>
                          <span
                            className={`not-italic text-[11px] uppercase tracking-wider font-bold px-2 py-0.5 rounded border ${
                              pub.type === "Journal"
                                ? "bg-indigo-50 text-indigo-700 border-indigo-100"
                                : "bg-teal-50 text-teal-700 border-teal-100"
                            }`}
                          >
                            {pub.type}
                          </span>
                        </p>
                      </div>
                    </div>
                  ))}
                </div>
              </section>
            </main>

            {/* Footer */}
            <footer className="w-full bg-slate-50 border-t border-slate-200 py-8 text-center mt-auto">
              <p className="text-slate-500 text-sm">
                &copy; {new Date().getFullYear()} {profileData.personal.name}.
                All rights reserved.
              </p>
            </footer>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<ResearcherProfile />);
    </script>
  </body>
</html>
