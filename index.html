<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />

    <!-- ================= SEO OPTIMIZATIONS ================= -->
    <title>
      Mr. Souravh Choursiya | Finance & International Business | University of
      Delhi
    </title>
    <meta
      name="title"
      content="Mr. Souravh Choursiya | Finance & International Business | University of Delhi"
    />
    <meta
      name="description"
      content="Souravh Choursiya is an M.Com student of Delhi University and a keen researcher in the area of Finance and International Business."
    />
    <meta
      name="keywords"
      content="Souravh Choursiya, Finance and International Business, Conceptual Synthesis, Security Analysis, University of Delhi, Researcher, AI"
    />
    <meta name="author" content="Mr. Souravh Choursiya" />

    <!-- Favicon -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>"
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="profile" />
    <meta
      property="og:url"
      content="https://souravhchoursiya.github.io/profile/"
    />
    <meta
      property="og:title"
      content="Mr. Souravh Choursiya - Researcher Profile"
    />
    <meta
      property="og:description"
      content="Student at University of Delhi focusing on Finance and International Business."
    />
    <meta property="og:image" content="" />

    <!-- Schema.org Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Souravh Choursiya",
        "honorificPrefix": "Mr.",
        "jobTitle": "Student",
        "affiliation": {
          "@type": "Organization",
          "name": "University of Delhi"
        },
        "url": "https://souravhchoursiya.github.io/profile/",
        "image": "",
        "sameAs": [
          "https://scholar.google.com/citations?user=YOUR_ID",
          "https://orcid.org/0000-0002-1234-5678"
        ],
        "knowsAbout": ["Finance", "International Business", "Security Analysis"]
      }
    </script>
    <!-- ===================================================== -->

    <!-- Google Analytics -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-XXXXXXXXXX");
    </script>

    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Load React & ReactDOM -->
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>

    <!-- Load Babel to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Custom Tailwind Configuration for Simple Academic Theme -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Inter"', "system-ui", "sans-serif"],
              serif: ['"Merriweather"', "Georgia", "serif"],
            },
          },
        },
      };
    </script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap");

      html {
        scroll-behavior: smooth;
      }
      body {
        background-color: #ffffff;
      }

      ::selection {
        background-color: #bfdbfe;
        color: #1e3a8a;
      }
    </style>
  </head>
  <body
    class="text-slate-800 antialiased min-h-screen font-serif flex flex-col items-center"
  >
    <noscript>
      <div style="padding: 20px; color: #1e293b; background: #ffffff">
        <h1>Mr. Souravh Choursiya</h1>
        <h2>Student at University of Delhi</h2>
        <p>Research focusing on Finance and International Business.</p>
      </div>
    </noscript>

    <div id="root" class="w-full"></div>

    <script type="text/babel">
      // --- INLINE ICONS ---
      const Mail = ({ className }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <rect width="20" height="16" x="2" y="4" rx="2" />
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
        </svg>
      );
      const Building2 = ({ className }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z" />
          <path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2" />
          <path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2" />
          <path d="M10 6h4" />
          <path d="M10 10h4" />
          <path d="M10 14h4" />
          <path d="M10 18h4" />
        </svg>
      );
      const MapPin = ({ className }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" />
          <circle cx="12" cy="10" r="3" />
        </svg>
      );
      const ExternalLink = ({ className }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <path d="M15 3h6v6" />
          <path d="M10 14 21 3" />
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
        </svg>
      );
      const Check = ({ className }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <polyline points="20 6 9 17 4 12" />
        </svg>
      );
      const UserIcon = ({ className }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 20 20"
          fill="currentColor"
          className={className}
        >
          <path
            fillRule="evenodd"
            d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"
            clipRule="evenodd"
          />
        </svg>
      );

      // --- MAIN APP COMPONENT ---
      function ResearcherProfile() {
        // --- USER DATA ---
        const profileData = {
          personal: {
            name: "Souravh Choursiya",
            titlePrefix: "Mr.",
            photoUrl: "", // Add your photo URL here
            role: "Student",
            affiliation: "University of Delhi",
            department: "Department of Commerce",
            location: "New Delhi, India",
            email: "souravhchoursiya@commerce.du.ac.in",
            googleScholar: "#",
            researchGate:
              "https://www.researchgate.net/profile/Souravh-Choursiya",
            orcid: "#",
          },
          bio: "Souravh Choursiya is an M.Com student in the Department of Commerce at the University of Delhi. His academic pursuits and research are deeply focused on uncovering actionable insights within Finance and International Business dynamics, bridging the gap between theoretical models and real-world market applications.",
          interests: ["Finance", "International Business"],
          publications: [
            {
              id: 1,
              year: "2025",
              title: "#",
              authors: "Choursiya, S.",
              venue: "#",
              link: "#",
              type: "Journal",
            },
          ],
        };

        const formatAuthors = (authorsStr) => {
          const parts = authorsStr.split("Choursiya, S.");
          if (parts.length === 1) return authorsStr;
          return (
            <React.Fragment>
              {parts[0]}
              <strong className="text-slate-900 font-bold">
                Choursiya, S.
              </strong>
              {parts[1]}
            </React.Fragment>
          );
        };

        const handleEmailClick = (e) => {
          e.preventDefault();
          const textArea = document.createElement("textarea");
          textArea.value = profileData.personal.email;
          textArea.style.position = "fixed";
          textArea.style.left = "-9999px";
          document.body.appendChild(textArea);
          textArea.focus();
          textArea.select();
          try {
            document.execCommand("copy");
            setCopiedEmail(true);
            setTimeout(() => setCopiedEmail(false), 2000);
          } catch (err) {
            console.error("Unable to copy", err);
          }
          document.body.removeChild(textArea);
        };

        return (
          <div className="w-full max-w-4xl mx-auto px-6 py-12 md:py-20 flex flex-col min-h-screen">
            {/* --- HEADER --- */}
            <header className="flex flex-col-reverse sm:flex-row items-start sm:items-center justify-between border-b border-slate-200 pb-8 mb-10 gap-8">
              <div className="flex-1">
                <h1 className="text-3xl sm:text-4xl font-bold text-slate-900 mb-2">
                  {profileData.personal.titlePrefix} {profileData.personal.name}
                </h1>
                <p className="text-lg text-slate-600 mb-1 font-sans">
                  {profileData.personal.role}
                </p>
                <p className="text-md text-slate-500 mb-6 font-sans">
                  {profileData.personal.department},{" "}
                  {profileData.personal.affiliation}{" "}
                  <br className="hidden sm:block" />
                  {profileData.personal.location}
                </p>

                {/* Academic Links & Contact */}
                <div className="flex flex-wrap items-center gap-4 text-sm font-sans">
                  <a
                    href={`mailto:${profileData.personal.email}`}
                    className="flex items-center text-blue-600 hover:text-blue-800 transition-colors"
                  >
                    <Mail className="w-4 h-4 mr-1.5" />
                    Email
                  </a>
                  <span className="text-slate-300">|</span>
                  <a
                    href={profileData.personal.googleScholar}
                    target="_blank"
                    rel="noopener noreferrer"
                    className="flex items-center text-blue-600 hover:text-blue-800 transition-colors"
                  >
                    Google Scholar{" "}
                    <ExternalLink className="w-3 h-3 ml-1 opacity-70" />
                  </a>
                  <span className="text-slate-300">|</span>
                  <a
                    href={profileData.personal.researchGate}
                    target="_blank"
                    rel="noopener noreferrer"
                    className="flex items-center text-blue-600 hover:text-blue-800 transition-colors"
                  >
                    ResearchGate{" "}
                    <ExternalLink className="w-3 h-3 ml-1 opacity-70" />
                  </a>
                  <span className="text-slate-300">|</span>
                  <a
                    href={profileData.personal.orcid}
                    target="_blank"
                    rel="noopener noreferrer"
                    className="flex items-center text-blue-600 hover:text-blue-800 transition-colors"
                  >
                    ORCID <ExternalLink className="w-3 h-3 ml-1 opacity-70" />
                  </a>
                </div>
              </div>

              {/* Avatar */}
              {profileData.personal.photoUrl ? (
                <div className="shrink-0 w-32 h-32 rounded bg-slate-100 overflow-hidden border border-slate-200">
                  <img
                    src={profileData.personal.photoUrl}
                    alt={profileData.personal.name}
                    className="w-full h-full object-cover"
                  />
                </div>
              ) : (
                <div className="shrink-0 w-24 h-24 sm:w-32 sm:h-32 rounded bg-slate-100 flex items-center justify-center border border-slate-200 relative overflow-hidden">
                  <div className="absolute inset-0 bg-slate-200 opacity-50 animate-pulse"></div>
                  <UserIcon className="w-12 h-12 sm:w-16 sm:h-16 text-slate-300 animate-pulse relative z-10 mt-3" />
                </div>
              )}
            </header>

            {/* --- MAIN CONTENT --- */}
            <main className="flex-grow flex flex-col gap-12">
              {/* Biography */}
              <section>
                <h2 className="text-xl font-bold text-slate-900 mb-4 border-b border-slate-100 pb-2">
                  Biography
                </h2>
                <p className="text-slate-700 leading-relaxed text-justify">
                  {profileData.bio}
                </p>
              </section>

              {/* Research Interests */}
              <section>
                <h2 className="text-xl font-bold text-slate-900 mb-4 border-b border-slate-100 pb-2">
                  Research Interests
                </h2>
                <ul className="list-disc list-inside text-slate-700 leading-relaxed space-y-1 ml-2">
                  {profileData.interests.map((interest, idx) => (
                    <li key={idx}>{interest}</li>
                  ))}
                </ul>
              </section>

              {/* Publications */}
              <section>
                <h2 className="text-xl font-bold text-slate-900 mb-6 border-b border-slate-100 pb-2">
                  Selected Publications
                </h2>

                <div className="flex flex-col gap-6">
                  {profileData.publications.map((pub) => (
                    <div
                      key={pub.id}
                      className="flex flex-col sm:flex-row gap-2 sm:gap-6 items-start"
                    >
                      {/* Year Margin */}
                      <div className="shrink-0 sm:w-16 font-sans font-semibold text-slate-500 pt-0.5">
                        {pub.year}
                      </div>

                      {/* Citation details */}
                      <div className="flex-1 text-slate-800 leading-relaxed">
                        <p>
                          {formatAuthors(pub.authors)}{" "}
                          <a
                            href={pub.link}
                            target="_blank"
                            rel="noopener noreferrer"
                            className="text-blue-700 hover:text-blue-900 hover:underline"
                          >
                            {pub.title}.
                          </a>{" "}
                          <em className="text-slate-600">{pub.venue}</em>.
                        </p>
                        <span className="inline-block mt-1 font-sans text-xs font-medium text-slate-500 bg-slate-100 px-2 py-0.5 rounded">
                          {pub.type}
                        </span>
                      </div>
                    </div>
                  ))}
                </div>
              </section>
            </main>

            {/* --- FOOTER --- */}
            <footer className="w-full mt-16 pt-8 border-t border-slate-200 text-center font-sans text-sm text-slate-500">
              <p>
                &copy; {new Date().getFullYear()} {profileData.personal.name}.
                All rights reserved.
              </p>
            </footer>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<ResearcherProfile />);
    </script>
  </body>
</html>
