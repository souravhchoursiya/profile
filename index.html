<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />

    <!-- ================= SEO OPTIMIZATIONS ================= -->
    <title>
      Mr. Souravh Choursiya | Finance & International Business | University of
      Delhi
    </title>
    <meta
      name="title"
      content="Mr. Souravh Choursiya | Finance & International Business | University of Delhi"
    />
    <meta
      name="description"
      content="Souravh Choursiya is an M.Com student of Delhi University and a keen researcher in the area of Finance and International Business."
    />
    <meta
      name="keywords"
      content="Souravh Choursiya, Finance and International Business, Conceptual Synthesis, Security Analysis, University of Delhi, Researcher, AI"
    />
    <meta name="author" content="Mr. Souravh Choursiya" />

    <!-- Favicon -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>"
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="profile" />
    <meta
      property="og:url"
      content="https://souravhchoursiya.github.io/profile/"
    />
    <meta
      property="og:title"
      content="Mr. Souravh Choursiya - Researcher Profile"
    />
    <meta
      property="og:description"
      content="Student at University of Delhi focusing on Finance and International Business."
    />
    <meta property="og:image" content="" />

    <!-- Schema.org Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Souravh Choursiya",
        "honorificPrefix": "Mr.",
        "jobTitle": "Student",
        "affiliation": {
          "@type": "Organization",
          "name": "University of Delhi"
        },
        "url": "https://souravhchoursiya.github.io/profile/",
        "image": "",
        "sameAs": [
          "https://scholar.google.com/citations?user=YOUR_ID",
          "https://orcid.org/0009-0005-1765-0872"
        ],
        "knowsAbout": ["Finance", "International Business", "Security Analysis"]
      }
    </script>
    <!-- ===================================================== -->

    <!-- Google Analytics -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-ZFJ2Y1KGHS"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-ZFJ2Y1KGHS");
    </script>

    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Load React & ReactDOM -->
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>

    <!-- Load Babel to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Custom Tailwind Configuration for Simple Academic Theme -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Inter"', "system-ui", "sans-serif"],
              serif: ['"Merriweather"', "Georgia", "serif"],
            },
          },
        },
      };
    </script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap");

      html {
        scroll-behavior: smooth;
      }
      body {
        background-color: #ffffff;
      }

      ::selection {
        background-color: #bfdbfe;
        color: #1e3a8a;
      }
    </style>
  </head>
  <body
    class="text-slate-800 antialiased min-h-screen font-serif flex flex-col items-center"
  >
    <noscript>
      <div style="padding: 20px; color: #1e293b; background: #ffffff">
        <h1>Mr. Souravh Choursiya</h1>
        <h2>Student at University of Delhi</h2>
        <p>Research focusing on Finance and International Business.</p>
      </div>
    </noscript>

    <div id="root" class="w-full"></div>

    <script type="text/babel">
      // --- INLINE ICONS ---
      const Mail = ({ className }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <rect width="20" height="16" x="2" y="4" rx="2" />
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
        </svg>
      );
      const ExternalLink = ({ className }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <path d="M15 3h6v6" />
          <path d="M10 14 21 3" />
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
        </svg>
      );
      const UserIcon = ({ className }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 20 20"
          fill="currentColor"
          className={className}
        >
          <path
            fillRule="evenodd"
            d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"
            clipRule="evenodd"
          />
        </svg>
      );
      const BookOpen = ({ className }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
        </svg>
      );

      // --- MAIN APP COMPONENT ---
      function ResearcherProfile() {
        // --- USER DATA ---
        const profileData = {
          personal: {
            name: "Souravh Choursiya",
            titlePrefix: "Mr.",
            photoUrl: "https://avatars.githubusercontent.com/u/68826118",
            role: "Student",
            affiliation: "University of Delhi",
            department: "Department of Commerce",
            location: "New Delhi, India",
            email: "souravhchoursiya@commerce.du.ac.in",
            googleScholar: "#",
            researchGate:
              "https://www.researchgate.net/profile/Souravh-Choursiya",
            orcid: "https://orcid.org/0009-0005-1765-0872",
          },
          bio: "Souravh Choursiya is an M.Com student in the Department of Commerce at the University of Delhi. His academic pursuits and research are deeply focused on uncovering actionable insights within Finance and International Business dynamics, bridging the gap between theoretical models and real-world market applications.",
          interests: ["Finance"],
          publications: [
               {
              id: 1,
              year: "2026",
              title: "Day of the Week Effect in the Vietnam Stock Market: Evidence from the VN Index. , 10(2)",
              authors: "Souravh Choursiya",
              venue: "https://doi.org/10.47772/IJRISS.2026.10200509",
              status: "published",
              link: "https://doi.org/10.47772/IJRISS.2026.10200509",
              type: "Journal Article",
            },
          ],
        };

        const formatAuthors = (authorsStr) => {
          const parts = authorsStr.split("Souravh Choursiya");
          if (parts.length === 1) return authorsStr;
          return (
            <React.Fragment>
              {parts[0]}
              <strong className="text-slate-900 font-bold">
                Souravh Choursiya
              </strong>
              {parts[1]}
            </React.Fragment>
          );
        };

        return (
          <div className="w-full flex flex-col min-h-screen">
            {/* --- STICKY HEADER --- */}
            <header className="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200">
              <div className="max-w-4xl mx-auto px-6 py-8 flex flex-col-reverse sm:flex-row items-start sm:items-center justify-between gap-8">
                <div className="flex-1">
                  <h1 className="text-3xl sm:text-4xl font-bold text-slate-900 mb-2">
                    {profileData.personal.titlePrefix}{" "}
                    {profileData.personal.name}
                  </h1>
                  <p className="text-lg text-slate-600 mb-1 font-sans">
                    {profileData.personal.role}
                  </p>
                  <p className="text-md text-slate-500 mb-6 font-sans">
                    {profileData.personal.department},{" "}
                    {profileData.personal.affiliation}{" "}
                    <br className="hidden sm:block" />
                    {profileData.personal.location}
                  </p>

                  {/* Academic Links & Contact */}
                  <div className="flex flex-wrap items-center gap-4 text-sm font-sans">
                    <a
                      href={`mailto:${profileData.personal.email}`}
                      className="flex items-center text-blue-600 hover:text-blue-800 transition-colors"
                    >
                      <Mail className="w-4 h-4 mr-1.5" />
                      Email
                    </a>
                    <span className="text-slate-300">|</span>
                    <a
                      href={profileData.personal.googleScholar}
                      target="_blank"
                      rel="noopener noreferrer"
                      className="flex items-center text-blue-600 hover:text-blue-800 transition-colors"
                    >
                      Google Scholar{" "}
                      <ExternalLink className="w-3 h-3 ml-1 opacity-70" />
                    </a>
                    <span className="text-slate-300">|</span>
                    <a
                      href={profileData.personal.researchGate}
                      target="_blank"
                      rel="noopener noreferrer"
                      className="flex items-center text-blue-600 hover:text-blue-800 transition-colors"
                    >
                      ResearchGate{" "}
                      <ExternalLink className="w-3 h-3 ml-1 opacity-70" />
                    </a>
                    <span className="text-slate-300">|</span>
                    <a
                      href={profileData.personal.orcid}
                      target="_blank"
                      rel="noopener noreferrer"
                      className="flex items-center text-blue-600 hover:text-blue-800 transition-colors"
                    >
                      ORCID <ExternalLink className="w-3 h-3 ml-1 opacity-70" />
                    </a>
                  </div>
                </div>

                {/* Avatar */}
                {profileData.personal.photoUrl ? (
                  <div className="shrink-0 w-24 h-24 sm:w-32 sm:h-32 rounded bg-slate-100 overflow-hidden border border-slate-200 shadow-sm">
                    <img
                      src={profileData.personal.photoUrl}
                      alt={profileData.personal.name}
                      className="w-full h-full object-cover"
                    />
                  </div>
                ) : (
                  <div className="shrink-0 w-24 h-24 sm:w-32 sm:h-32 rounded bg-slate-100 flex items-center justify-center border border-slate-200 relative overflow-hidden">
                    <div className="absolute inset-0 bg-slate-200 opacity-50 animate-pulse"></div>
                    <UserIcon className="w-12 h-12 sm:w-16 sm:h-16 text-slate-300 animate-pulse relative z-10 mt-3" />
                  </div>
                )}
              </div>
            </header>

            {/* --- MAIN CONTENT --- */}
            <main className="max-w-4xl mx-auto px-6 py-12 flex-grow flex flex-col gap-12">
              {/* Biography */}
              <section>
                <h2 className="text-xl font-bold text-slate-900 mb-4 border-b border-slate-100 pb-2 uppercase tracking-wide text-sm">
                  Biography
                </h2>
                <p className="text-slate-700 leading-relaxed text-justify">
                  {profileData.bio}
                </p>
              </section>

              {/* Research Interests */}
              <section>
                <h2 className="text-xl font-bold text-slate-900 mb-4 border-b border-slate-100 pb-2 uppercase tracking-wide text-sm">
                  Research Interests
                </h2>

                <div className="flex flex-wrap gap-2 sm:gap-3 text-left">
                  {profileData.interests.map((interest, idx) => (
                    <span
                      key={idx}
                      className="px-3 py-1 bg-slate-50 text-slate-700 text-xs sm:text-sm font-sans font-semibold rounded-xl border border-slate-100 shadow-sm"
                    >
                      {interest}
                    </span>
                  ))}
                </div>
              </section>

              {/* Academic Works Section */}
              <section>
                <h2 className="text-xl font-bold text-slate-900 mb-6 border-b border-slate-100 pb-2 uppercase tracking-wide text-sm">
                  Academic Works
                </h2>

                <div className="flex flex-col gap-6">
                  {profileData.publications.length > 0 ? (
                    profileData.publications.map((pub) => (
                      <div
                        key={pub.id}
                        className="flex flex-col gap-1.5 group text-left max-w-3xl"
                      >
                        <div className="text-slate-800 text-sm sm:text-base font-serif leading-relaxed">
                          <span className="font-bold">{pub.authors}</span> (
                          {pub.year}).
                          <a
                            href={pub.link}
                            target="_blank"
                            className="hover:text-blue-700 transition-colors ml-1"
                          >
                            {pub.title}.
                          </a>
                          <span className="italic ml-1">{pub.venue}.</span>
                          {pub.status !== "published" && (
                            <span className="ml-1 text-slate-500 italic">
                              [{pub.status}]
                            </span>
                          )}
                        </div>

                        <div className="flex items-center gap-3 font-sans">
                          <span className="text-[9px] sm:text-[10px] font-bold text-blue-500 uppercase tracking-widest bg-blue-50 px-1.5 py-0.5 rounded">
                            {pub.type}
                          </span>
                        </div>
                      </div>
                    ))
                  ) : (
                    <div className="flex flex-col items-center justify-center py-12 sm:py-16 bg-slate-50/50 rounded-3xl border border-slate-100 border-dashed">
                      <BookOpen className="w-10 h-10 text-slate-400 mb-4" />
                      <h2 className="text-slate-800 font-bold text-lg mb-1">
                        Study in Progress
                      </h2>
                      <p className="text-slate-600 text-sm text-center max-w-sm px-4 font-sans leading-relaxed">
                        Currently synthesizing actionable insights within
                        Finance and International Business. Completed works will
                        be listed here following APA standards.
                      </p>
                    </div>
                  )}
                </div>
              </section>
            </main>

            {/* --- FOOTER --- */}
            <footer className="w-full py-12 border-t border-slate-100 text-center font-sans text-[10px] font-bold uppercase tracking-[0.4em] text-slate-400">
              <p>
                &copy; {new Date().getFullYear()}{" "}
                {profileData.personal.name.toUpperCase()}. ACADEMIC DOSSIER.
              </p>
            </footer>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<ResearcherProfile />);
    </script>
  </body>
</html>
